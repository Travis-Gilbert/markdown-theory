# Markdown Theory Workflow Add Or Enhance Document Type Or Recipe

## Action

Follow the add-or-enhance-document-type-or-recipe workflow:
1. Edit or add to types.json (document type data)
2. Update TypeScript schema/types (e.g., types.ts, recipes.ts)
3. Update or add registry/reader logic (e.g., index.ts, resolveType, recipeFromDescriptor)
4. Update or add tests for new types/recipes (e.g., index.test.ts, family.test.ts, fixture-matrix.test.tsx)
5. Update package.json if new package or scope change
6. Run typecheck and ensure all tests pass

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: packages/document-types/types.json, packages/document-types/src/types.ts, packages/document-types/src/index.ts

