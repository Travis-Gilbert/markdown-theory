name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: typecheck + lint + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint:literals
      - run: pnpm test
      # Verify the publishable dist build (tsup .js + .d.ts) stays green.
      - run: pnpm -r build

  visual:
    name: G7 gates (overflow / contrast / widow / page-object / heading-binding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Generate fixtures, then run the OS-independent gates as merge blockers.
      # These assert computed geometry, contrast, overflow, that the page object
      # is present (its background differs from the ground and content sits inset
      # at every viewport), and the heading-binding ratio -- all stable across
      # platforms. Reverting P1 (the page object) fails the page-object gate.
      # Pixel snapshots stay a local check (baselines are committed per-OS);
      # changing one requires a token/punch-item reference in the commit message.
      - run: pnpm demo:permutations && pnpm demo:readmes && pnpm demo:briefs
      - run: pnpm exec playwright test --grep-invert snapshot
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
